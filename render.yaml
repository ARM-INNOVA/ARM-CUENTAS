services:
  - type: web
    name: arm-cuentas-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && python create_admin.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: arm-cuentas-storage
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: arm-cuentas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: USE_OCR
        value: "True"
      - key: USE_S3
        value: "False"
      - key: ALLOWED_ORIGINS
        value: https://arm-cuentas-web.onrender.com,http://localhost:3000,http://localhost:5173

  - type: web
    name: arm-cuentas-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        value: https://arm-cuentas-api.onrender.com/api

databases:
  - name: arm-cuentas-db
    databaseName: arm_cuentas
    user: armcuentas
    plan: free
