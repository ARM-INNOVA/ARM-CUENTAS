# ARM CUENTAS - Configuración Render Blueprint
# Este archivo configura el despliegue automático en Render

services:
  - type: web
    name: arm-cuentas-api
    env: python
    plan: starter
    pythonVersion: 3.9
    
    # Build - Instalar dependencias
    buildCommand: cd backend && pip install -r requirements.txt
    
    # Start - Iniciar servidor FastAPI con Uvicorn
    startCommand: |
      cd backend && 
      python -m alembic upgrade head || true && 
      python init_db.py && 
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    # Rutas públicas
    routes:
      - path: /
        matchType: prefix
      - path: /api
        matchType: prefix
      - path: /docs
        matchType: prefix
      - path: /health
        matchType: exact
    
    # Variables de entorno
    envVars:
      # Base de datos
      - key: DATABASE_URL
        fromDatabase:
          name: arm-cuentas-db
          property: connectionString
      
      # Seguridad - Se genera automáticamente
      - key: SECRET_KEY
        generateValue: true
      
      # Almacenamiento
      - key: UPLOAD_DIR
        value: /var/data/uploads
      
      # Aplicación
      - key: DEBUG
        value: "False"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENVIRONMENT
        value: production
      
      # CORS - Agregar tu dominio aquí después de desplegar
      - key: ALLOWED_ORIGINS
        value: https://arm-cuentas.onrender.com,http://localhost:3000,http://localhost:5173
      
      # OCR
      - key: USE_OCR
        value: "True"
      
      # S3 (opcional)
      - key: USE_S3
        value: "False"
    
    # Disco persistente para guardar facturas
    disk:
      name: arm-cuentas-storage
      mountPath: /var/data
      sizeGB: 5
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 60
    healthCheckTimeoutSeconds: 30
    
    # Autoscaling
    numInstances: 1
    maxInstances: 3

  - type: web
    name: arm-cuentas-web
    env: node
    plan: starter
    nodeVersion: 18
    
    # Build - Compilar React con Vite
    buildCommand: cd frontend && npm install && npm run build
    
    # Start - Servir archivos estáticos
    startCommand: cd frontend && npm install && npx serve -s dist -l $PORT
    
    # Rutas
    routes:
      - path: /
        matchType: prefix
    
    # Variables de entorno
    envVars:
      - key: VITE_API_URL
        value: https://arm-cuentas-api.onrender.com/api

# Bases de datos
databases:
  - name: arm-cuentas-db
    databaseName: arm_cuentas
    user: armcuentas
    plan: starter
    region: frankfurt
    ipAllowList: []  # Permite cualquier IP (Render)

# Variables de entorno compartidas (opcional)
envVars: []

# Rutas personalizadas (si aplica)
routes:
  - path: /api/*
    service: arm-cuentas-api
  - path: /health
    service: arm-cuentas-api
  - path: /docs
    service: arm-cuentas-api
  - path: /*
    service: arm-cuentas-web
