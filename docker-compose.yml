version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: armcuentas
      POSTGRES_PASSWORD: armcuentas123
      POSTGRES_DB: arm_cuentas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armcuentas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://armcuentas:armcuentas123@postgres:5432/arm_cuentas
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "True"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m uvicorn app.main:app --reload --host 0.0.0.0

  # Frontend React (opcional, puedes usar npm run dev directamente)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api
    command: npm run dev

volumes:
  postgres_data:
